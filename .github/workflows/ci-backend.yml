name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "script_db.txt"
      - "docker-compose.yaml"
      - "docker-compose.prod.yaml"
      - ".env.example"
      - ".env.prod.example"
      - ".github/workflows/ci-backend.yml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  ci-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_BACKEND_REPO: ${{ secrets.DOCKERHUB_BACKEND_REPO }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Test
        working-directory: backend
        run: npm test -- --passWithNoTests

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_BACKEND_REPO != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_BACKEND_REPO != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_BACKEND_REPO }}:latest
            ${{ env.DOCKERHUB_BACKEND_REPO }}:sha-${{ github.sha }}

      - name: Build backend image without push
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' || env.DOCKERHUB_BACKEND_REPO == '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: aml-task-backend:ci

services:
  postgres:
    container_name: postgres_dev_aml_db
    image: postgres:16-alpine
    env_file:
      - .env.dev
    environment:
      - PGDATA=/data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - ${POSTGRES_PORT:-5433}:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    container_name: redis_dev_aml_cache
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    container_name: rabbitmq_dev_aml
    image: rabbitmq:3.13-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  default:
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres:
